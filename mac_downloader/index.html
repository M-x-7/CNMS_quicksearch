<!DOCTYPE html>
<html lang="zh-TW">
<head>
<link rel="icon" type="image/png" href="icon.png">
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FN MAC下載工具</title>
<style>
body {
    font-family: Arial;
    padding: 20px;
    background: #f5f5f5;
}

#inputBox {
    width: 280px;
    padding: 12px 14px;
    font-size: 22px;
    border: 2px solid #aaa;
    border-radius: 6px;
    outline: none;
}

#inputBox:focus {
    border-color: #1a7fd4;
}

#tags {
    margin-top: 15px;
    min-height: 20px;
}

.tag {
    display: inline-block;
    padding: 10px 18px;
    margin: 6px;
    background: #fff;
    border: 2px solid #333;
    border-radius: 8px;
    cursor: pointer;
    font-size: 18px;
    font-weight: bold;
    letter-spacing: 1px;
    user-select: none;
}

.tag.so730 {
    border-color: #1a7fd4;
    color: #1a7fd4;
    background: #eef5fd;
}

.tag.so720 {
    border-color: #e07b00;
    color: #e07b00;
    background: #fff8f0;
}

.tag:hover {
    opacity: 0.6;
}

#linksArea {
    margin-top: 20px;
}

.link-block {
    margin-bottom: 12px;
    padding: 12px 15px;
    background: #fff;
    border: 1px solid #ccc;
    border-radius: 6px;
    display: flex;
    align-items: center;
    gap: 12px;
}

.link-label {
    font-weight: bold;
    white-space: nowrap;
    font-size: 14px;
}

.link-label.so730 { color: #1a7fd4; }
.link-label.so720 { color: #e07b00; }

.link-url {
    flex: 1;
    word-break: break-all;
    font-size: 13px;
    color: #333;
}

.dl-btn {
    padding: 7px 14px;
    font-size: 14px;
    background: #4caf50;
    color: #fff;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    white-space: nowrap;
}

.dl-btn:hover { background: #388e3c; }

#allBtn {
    margin-top: 10px;
    padding: 10px 24px;
    font-size: 15px;
    background: #1a7fd4;
    color: #fff;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    display: none;
}

#allBtn:hover { background: #145fa0; }

.tag-row {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 6px;
}

.row-label {
    font-size: 15px;
    font-weight: bold;
    margin-right: 4px;
    white-space: nowrap;
}

.row-label.so730 { color: #1a7fd4; }
.row-label.so720 { color: #e07b00; }

.hint {
    font-size: 12px;
    color: #888;
    margin-top: 6px;
}
</style>
</head>
<body>

<input id="inputBox" placeholder="輸入5位數按 Enter" autofocus>
<div class="hint">點擊標籤可刪除</div>
<div id="tags"></div>
<div id="linksArea"></div>
<button id="allBtn">全部下載</button>

<script>
let data = []; // [{val, so}]

// 判斷 so 值，不符合兩組的回傳 null（略過）
function getSo(val) {
    const prefix = val.substring(0, 2);
    if (["00","01","02","06","12"].includes(prefix)) return 730;
    if (["03","04","05","07","11","13"].includes(prefix)) return 720;
    return null;
}

const inputBox  = document.getElementById("inputBox");
const tagsDiv   = document.getElementById("tags");
const linksArea = document.getElementById("linksArea");
const allBtn    = document.getElementById("allBtn");

inputBox.addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
        const val = inputBox.value.trim();
        const so = getSo(val);
        if (/^\d{5}$/.test(val) && so !== null && !data.find(d => d.val === val)) {
            data.push({ val, so });
            render();
        }
        inputBox.value = "";
    }
});

function buildURL(so, items) {
    let url = `https://r1.homeplus.net.tw/NMS/FNCustInfo?so=${so}`;
    items.forEach((item, i) => {
        url += `&fn[${i}]=${item.val}`;
    });
    url += "&_columns_=ServiceName%2CSubsID%2Caddress%2Ccmmac%2Cfn%2Cso%2Cswversion&_export_=all";
    return url;
}

function renderTagRow(so, items) {
    if (items.length === 0) return;
    const label = so === 730 ? "GD" : "CL";
    const row = document.createElement("div");
    row.className = "tag-row";
    const rowLabel = document.createElement("span");
    rowLabel.className = "row-label so" + so;
    rowLabel.innerText = label + "：";
    row.appendChild(rowLabel);
    items.forEach(item => {
        const div = document.createElement("div");
        div.className = "tag so" + item.so;
        div.title = "點擊刪除";
        div.innerText = item.val;
        div.onclick = () => {
            const idx = data.indexOf(item);
            data.splice(idx, 1);
            render();
        };
        row.appendChild(div);
    });
    tagsDiv.appendChild(row);
}

function render() {
    // --- 標籤區 ---
    tagsDiv.innerHTML = "";
    const gd = data.filter(d => d.so === 730);
    const cl = data.filter(d => d.so === 720);
    renderTagRow(730, gd);
    renderTagRow(720, cl);

    // --- 連結區 ---
    linksArea.innerHTML = "";
    const groups = {};
    data.forEach(item => {
        if (!groups[item.so]) groups[item.so] = [];
        groups[item.so].push(item);
    });

    const soList = Object.keys(groups).map(Number).sort((a,b) => b - a); // 730 先

    soList.forEach(so => {
        const items = groups[so];
        const url = buildURL(so, items);
        const label = so === 730 ? "GD (so=730)" : "CL (so=720)";
        const cls = "so" + so;

        const block = document.createElement("div");
        block.className = "link-block";
        block.innerHTML = `
            <span class="link-label ${cls}">${label}</span>
            <span class="link-url">${url}</span>
            <button class="dl-btn">下載</button>
        `;
        block.querySelector(".dl-btn").onclick = () => window.open(url, "_blank");
        linksArea.appendChild(block);
    });

    // --- 全部下載按鈕 ---
    allBtn.style.display = soList.length > 1 ? "inline-block" : "none";
    allBtn.onclick = () => {
        soList.forEach(so => window.open(buildURL(so, groups[so]), "_blank"));
    };
}
</script>
</body>
</html>
